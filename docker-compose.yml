services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      MONGODB_URI: mongodb://mongo:27017/merlynn
      AUTH_SECRET: e2e-test-secret-key-not-for-production
      AUTH_URL: http://localhost:3000
    depends_on:
      - mongo
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: merlynn

  mongo-express:
    image: mongo-express:1
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongo

  storybook:
    build:
      context: .
      dockerfile: Dockerfile.visual
    ports:
      - "6006:6006"
    command: bun run storybook -- --host 0.0.0.0 --ci
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6006"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s
    profiles:
      - visual

  visual-test:
    build:
      context: .
      dockerfile: Dockerfile.visual
    volumes:
      # Mount snapshot files so updates persist back to host
      - ./packages/ui/stories/__screenshots__:/app/packages/ui/stories/__screenshots__
    environment:
      STORYBOOK_URL: http://storybook:6006
    depends_on:
      storybook:
        condition: service_healthy
    command: bun run test:visual
    profiles:
      - visual

  e2e:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    volumes:
      - ./apps/web/playwright-report:/app/apps/web/playwright-report
      - ./apps/web/test-results:/app/apps/web/test-results
    environment:
      BASE_URL: http://web:3000
      MONGODB_URI: mongodb://mongo:27017/merlynn
    depends_on:
      web:
        condition: service_healthy
    command: bun run test:e2e
    profiles:
      - e2e

volumes:
  mongo_data:
