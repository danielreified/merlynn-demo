name: Deploy

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: af-south-1

jobs:
  # ─── CI ───────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: rharkor/caching-for-turbo@v1.8
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: rharkor/caching-for-turbo@v1.8
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  test-db:
    name: Test — DB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun test --cwd packages/db

  # ─── Build ────────────────────────────────────────────────
  build-web:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-db]
    environment: dev
    outputs:
      image: ${{ steps.image.outputs.uri }}
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Build and push Docker image
        id: image
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          SHORT_SHA: ${{ github.sha }}
        run: |
          DEV_TAG=dev-${SHORT_SHA:0:7}
          IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:$DEV_TAG
          docker build -t $IMAGE_URI -t $ECR_REGISTRY/$ECR_REPOSITORY:dev-latest .
          docker push $IMAGE_URI
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:dev-latest
          echo "uri=$IMAGE_URI" >> $GITHUB_OUTPUT

  # ─── Deploy ───────────────────────────────────────────────
  deploy-web:
    name: Deploy Web App
    runs-on: ubuntu-latest
    needs: [build-web]
    environment: dev
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ECS service
        env:
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
          ECS_SERVICE: ${{ secrets.ECS_SERVICE }}
        run: |
          echo "Deploying image: ${{ needs.build-web.outputs.image }}"
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for deployment
        env:
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
          ECS_SERVICE: ${{ secrets.ECS_SERVICE }}
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --region ${{ env.AWS_REGION }}

  deploy-storybook:
    name: Deploy Storybook
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-db]
    environment: dev
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Build Storybook
        run: cd packages/ui && bun run build-storybook

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: aws s3 sync packages/ui/storybook-static s3://${{ secrets.STORYBOOK_BUCKET }} --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.STORYBOOK_DISTRIBUTION_ID }} \
            --paths "/*"

  deploy-emails:
    name: Deploy Email Previews
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-db]
    environment: dev
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Export email previews
        run: cd packages/email && bun run build && bunx react-email export --outDir out

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: aws s3 sync packages/email/out s3://${{ secrets.EMAILS_BUCKET }} --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.EMAILS_DISTRIBUTION_ID }} \
            --paths "/*"
